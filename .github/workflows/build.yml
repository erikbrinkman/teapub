name: build

on:
  push:
  pull_request:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun test
      - run: bun export

      # Verify the published package shape (manifest + ESM type resolution)
      - run: bunx publint --strict
      - run: bunx --bun @arethetypeswrong/cli --pack --profile esm-only

name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options: [patch, minor, major]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      # Gate — fail fast before any side effects
      - run: bun lint
      - run: bun test
      - run: bun export

      # Version bump → commit + tag (local only, not pushed yet)
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }}

      # Publish to npm with provenance (authenticated via OIDC trusted publishing)
      # Done before git push so a publish failure won't leave orphaned version bumps
      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --provenance --access public --ignore-scripts

      - run: git push --follow-tags

      # GitHub Release with auto-generated notes
      - run: gh release create "v$(jq -r .version package.json)" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      # Docs
      - run: bun doc
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
